<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List App</title>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      color: #333;
    }

    /* ===== Container ===== */
    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.1);
      width: 100%;
      max-width: 560px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 24px;
      text-align: center;
      color: #4f46e5;
    }

    /* ===== Input Form ===== */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    #todo-input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }

    #todo-input:focus { border-color: #4f46e5; }

    #add-btn {
      padding: 10px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background .2s;
    }

    #add-btn:hover { background: #4338ca; }

    /* ===== Filter Tabs ===== */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filter-btn {
      flex: 1;
      padding: 7px;
      border: 2px solid #e5e7eb;
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: .85rem;
      transition: all .2s;
    }

    .filter-btn.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    /* ===== Todo List ===== */
    #todo-list { list-style: none; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid #f3f4f6;
      animation: slideIn .2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Checkbox สวยงาม */
    .todo-item input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 1rem;
      word-break: break-word;
    }

    .todo-text.done {
      text-decoration: line-through;
      color: #9ca3af;
    }

    /* ปุ่มลบ */
    .delete-btn {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 6px;
      transition: background .2s;
      flex-shrink: 0;
    }

    .delete-btn:hover { background: #fee2e2; }

    /* ===== Footer Stats ===== */
    .stats {
      margin-top: 16px;
      font-size: .85rem;
      color: #6b7280;
      text-align: center;
    }

    /* ===== Empty State ===== */
    .empty {
      text-align: center;
      color: #9ca3af;
      padding: 32px 0;
      font-size: .95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Todo List</h1>

    <!-- Form เพิ่ม todo -->
    <div class="input-row">
      <input
        id="todo-input"
        type="text"
        placeholder="เพิ่มรายการใหม่..."
        maxlength="200"
        autocomplete="off"
      />
      <button id="add-btn">+ เพิ่ม</button>
    </div>

    <!-- ปุ่ม Filter -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all">ทั้งหมด</button>
      <button class="filter-btn" data-filter="active">ยังไม่เสร็จ</button>
      <button class="filter-btn" data-filter="completed">เสร็จแล้ว</button>
    </div>

    <!-- รายการ Todo -->
    <ul id="todo-list"></ul>

    <!-- สถิติ -->
    <p class="stats" id="stats"></p>
  </div>

  <!-- โหลด JavaScript หลัก (defer = โหลดหลัง HTML parse เสร็จ) -->
  <script src="app.js" defer></script>
</body>
</html>
