<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Todo List</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#465FFF',
            'primary-dark': '#3346CC',
          },
          fontFamily: {
            sans: ['Inter', 'Segoe UI', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .todo-item { animation: fadeIn .18s ease forwards; }
  </style>
</head>

<body class="bg-[#F2F4F7] font-sans min-h-screen flex">

  <!-- ===== Sidebar ===== -->
  <aside class="hidden md:flex flex-col w-64 min-h-screen bg-white border-r border-gray-200 px-4 py-6 fixed top-0 left-0">
    <!-- Logo -->
    <div class="flex items-center gap-2 px-2 mb-8">
      <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
      </div>
      <span class="font-bold text-gray-900 text-lg">TodoAdmin</span>
    </div>

    <!-- Nav -->
    <nav class="flex flex-col gap-1">
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider px-3 mb-2">Main Menu</p>

      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-primary/10 text-primary font-semibold text-sm">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2"/>
        </svg>
        My Tasks
      </a>

      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-100 font-medium text-sm transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        Overview
      </a>

      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-100 font-medium text-sm transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Settings
      </a>
    </nav>

    <!-- User Profile -->
    <div class="mt-auto flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-gray-100 cursor-pointer transition">
      <div class="w-9 h-9 rounded-full bg-primary flex items-center justify-center text-white font-bold text-sm flex-shrink-0">S</div>
      <div class="min-w-0">
        <p class="text-sm font-semibold text-gray-800 truncate">seaindy</p>
        <p class="text-xs text-gray-400 truncate">seaindytravel@gmail.com</p>
      </div>
    </div>
  </aside>

  <!-- ===== Main Content ===== -->
  <main class="flex-1 md:ml-64 p-4 md:p-8">

    <!-- Top Bar -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">My Tasks</h1>
        <p class="text-sm text-gray-400 mt-0.5">จัดการรายการงานของคุณ</p>
      </div>
      <!-- Date Badge -->
      <span class="hidden sm:inline-flex items-center gap-1.5 text-sm text-gray-500 bg-white border border-gray-200 rounded-xl px-4 py-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        <span id="today-date"></span>
      </span>
    </div>

    <!-- ===== Stat Cards ===== -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">

      <div class="bg-white rounded-2xl border border-gray-100 p-5">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">ทั้งหมด</p>
        <p id="stat-total" class="text-3xl font-bold text-gray-900">0</p>
        <p class="text-xs text-gray-400 mt-1">tasks</p>
      </div>

      <div class="bg-white rounded-2xl border border-gray-100 p-5">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">ค้างอยู่</p>
        <p id="stat-active" class="text-3xl font-bold text-primary">0</p>
        <p class="text-xs text-gray-400 mt-1">tasks</p>
      </div>

      <div class="bg-white rounded-2xl border border-gray-100 p-5">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">เสร็จแล้ว</p>
        <p id="stat-done" class="text-3xl font-bold text-emerald-500">0</p>
        <p class="text-xs text-gray-400 mt-1">tasks</p>
      </div>

      <div class="bg-white rounded-2xl border border-gray-100 p-5">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">ความคืบหน้า</p>
        <p id="stat-pct" class="text-3xl font-bold text-gray-900">0%</p>
        <div class="mt-2 h-1.5 bg-gray-100 rounded-full overflow-hidden">
          <div id="progress-bar" class="h-full bg-primary rounded-full transition-all duration-500" style="width:0%"></div>
        </div>
      </div>

    </div>

    <!-- ===== Task Card ===== -->
    <div class="bg-white rounded-2xl border border-gray-100">

      <!-- Card Header -->
      <div class="flex flex-col sm:flex-row sm:items-center gap-4 p-6 border-b border-gray-100">

        <!-- Filter Tabs -->
        <div class="flex gap-1 bg-gray-100 rounded-xl p-1 w-fit">
          <button data-filter="all"       class="filter-btn px-4 py-1.5 rounded-lg text-sm font-medium bg-white text-gray-800 shadow-sm transition">ทั้งหมด</button>
          <button data-filter="active"    class="filter-btn px-4 py-1.5 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-700 transition">ค้างอยู่</button>
          <button data-filter="completed" class="filter-btn px-4 py-1.5 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-700 transition">เสร็จแล้ว</button>
        </div>

        <!-- Add Input -->
        <div class="flex gap-2 sm:ml-auto w-full sm:w-auto">
          <input
            id="todo-input"
            type="text"
            placeholder="เพิ่ม task ใหม่..."
            maxlength="200"
            autocomplete="off"
            class="
              flex-1 sm:w-64 border border-gray-200 rounded-xl
              px-4 py-2 text-sm text-gray-800 placeholder-gray-400
              focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition
            "
          />
          <button
            id="add-btn"
            class="
              bg-primary hover:bg-primary-dark text-white
              text-sm font-semibold px-4 py-2 rounded-xl
              transition-colors duration-150 whitespace-nowrap flex items-center gap-1.5
            "
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
            </svg>
            Add Task
          </button>
        </div>

      </div>

      <!-- Table Header -->
      <div class="hidden sm:grid grid-cols-[auto_1fr_auto_auto] gap-4 px-6 py-3 bg-gray-50 text-xs font-semibold text-gray-400 uppercase tracking-wider">
        <span>Done</span>
        <span>Task</span>
        <span class="text-center">Status</span>
        <span></span>
      </div>

      <!-- Todo List -->
      <ul id="todo-list" class="divide-y divide-gray-100"></ul>

      <!-- Empty State -->
      <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-gray-300">
        <svg class="w-14 h-14 mb-3" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        <p class="text-sm font-medium">ไม่มีรายการ</p>
      </div>

    </div>
  </main>

  <!-- Template: todo row -->
  <template id="todo-template">
    <li class="todo-item grid grid-cols-[auto_1fr_auto_auto] items-center gap-4 px-6 py-4 hover:bg-gray-50 transition group">
      <!-- Checkbox -->
      <input type="checkbox" class="w-4 h-4 accent-primary cursor-pointer rounded" />
      <!-- Text -->
      <span class="todo-text text-sm text-gray-700 break-words"></span>
      <!-- Badge -->
      <span class="badge text-xs font-semibold px-2.5 py-1 rounded-full whitespace-nowrap"></span>
      <!-- Delete -->
      <button class="delete-btn opacity-0 group-hover:opacity-100 p-1.5 rounded-lg text-gray-300 hover:text-red-500 hover:bg-red-50 transition-all" aria-label="ลบ">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      </button>
    </li>
  </template>

  <script src="/app.js"></script>
  <script>
    // แสดงวันที่ปัจจุบัน
    document.getElementById('today-date').textContent = new Date().toLocaleDateString('th-TH', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
  </script>
</body>
</html>
